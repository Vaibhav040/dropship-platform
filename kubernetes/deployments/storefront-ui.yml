apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront-ui
  namespace: dropship
  labels: 
    app: storefront-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storefront-ui
  template:
    metadata:
      labels:
        app: storefront-ui
    spec:
      containers:
      - name: storefront-ui
        image: 773384830615.dkr.ecr.ap-south-1.amazonaws.com/dropship-storefront-ui:c927801
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-ui
  namespace: dropship
  labels:
    app: storefront-ui
spec:
  type: ClusterIP
  selector:
    app: storefront-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80